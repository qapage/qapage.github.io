<header class="main-header">
  <nav class="center-wrapper nav-main">
    <a class="blog-logo" href="{{ site.baseurl }}/">{{ site.title }}</a>

    <button class="nav-toggle" aria-label="Toggle navigation" onclick="this.closest('.nav-main').classList.toggle('nav-open')">
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
    </button>

    <div class="nav-links">
      {% for my_page in site.pages %}
        {% if my_page.active %}
          <a href="{{ my_page.url | prepend: site.baseurl }}">{{ my_page.title }}</a>
        {% endif %}
      {% endfor %}
    </div>
  </nav>
</header>
